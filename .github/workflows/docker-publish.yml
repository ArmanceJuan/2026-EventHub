name: Build and Push to Docker Hub

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and test backend
        working-directory: ./backend
        run: |
          npm ci
          npx prisma generate
          npm run test:unit

      - name: Install and test frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/eventhub-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/eventhub-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/eventhub-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/eventhub-frontend:${{ github.sha }}
