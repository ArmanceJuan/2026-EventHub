name: Integration Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: eventhub
          POSTGRES_PASSWORD: eventhub
          POSTGRES_DB: eventhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventhub -d eventhub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Run backend integration tests
        working-directory: ./backend
        env:
          JWT_SECRET: test-secret
          DATABASE_URL: postgresql://eventhub:eventhub@localhost:5432/eventhub?schema=public
          MONGO_URI: mongodb://localhost:27017/analytics
        run: |
          npm ci
          npm run test:integration
