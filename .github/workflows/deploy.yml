name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Deploy on EC2 self-hosted runner
        shell: bash
        run: |
          set -euo pipefail

          REPO_DIR="$HOME/2026-EventHub"
          REPO_URL="https://github.com/${{ github.repository }}.git"

          if [ ! -d "$REPO_DIR/.git" ]; then
            git clone "$REPO_URL" "$REPO_DIR"
          fi

          cd "$REPO_DIR"
          git fetch origin main
          git reset --hard origin/main

          cat > backend/.env <<EOF
          PORT=8000
          APP_NAME=EventHub
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@db:5432/${{ secrets.DB_NAME }}?schema=public
          MONGO_URI=mongodb://mongo:27017/analytics
          EOF

          cd backend
          docker compose up --build -d
          docker compose ps
