version: "3.9"

services:
  db:
    image: postgres:15
    container_name: eventhub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eventhub
      POSTGRES_PASSWORD: eventhub
      POSTGRES_DB: eventhub
    ports:
      - "5432:5432"
    volumes:
      - eventhub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventhub -d eventhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:latest
    container_name: eventhub_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: analytics
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet mongodb://localhost:27017/test --eval \"db.adminCommand({ ping: 1 }).ok\""]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: node:20-alpine
    container_name: eventhub_migrate
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql://eventhub:eventhub@db:5432/eventhub?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm ci && npx prisma generate && npx prisma migrate deploy && npm run seed"

  backend:
    image: node:20-alpine
    container_name: eventhub_backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      PORT: 8000
      APP_NAME: EventHub
      DATABASE_URL: postgresql://eventhub:eventhub@db:5432/eventhub?schema=public
      MONGO_URI: mongodb://mongo:27017/analytics
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: sh -c "npm ci && npx prisma generate && npm run dev"

  frontend:
    image: node:20-alpine
    container_name: eventhub_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../frontend:/app
    expose:
      - "5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"

  nginx:
    image: nginx:stable-alpine
    container_name: eventhub_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  eventhub_pgdata:
